<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 WiFi Setup</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Connect ESP32 to WiFi</h1>
        <p id="run-count" style="margin-bottom:18px;color:#007BFF;font-weight:600;">Stored runs: loading...</p>
        <p id="battery-status" style="margin-bottom:18px;color:#555;font-weight:600;">Battery: loading...</p>
        <form method="POST" action="/connect">
            <div class="form-group">
                <label for="ssid">SSID:</label>
                <input type="text" id="ssid" name="ssid" placeholder="Enter WiFi SSID" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter WiFi password" required>
            </div>
            <button type="submit">Connect</button>
        </form>
    </div>
    <script>
        fetch('/runs')
            .then(r => r.json())
            .then(files => {
                const count = files.length;
                document.getElementById('run-count').textContent = 'Stored runs: ' + count;
            })
            .catch(() => {
                document.getElementById('run-count').textContent = 'Stored runs: unavailable';
            });
        fetch('/battery')
            .then(r => r.json())
            .then(data => {
                const pct = data.percent;
                const el = document.getElementById('battery-status');
                if (pct < 0) { el.textContent = 'Battery: unknown'; return; }
                el.textContent = 'Battery: ' + pct + '%';
                el.style.color = pct > 50 ? '#28a745' : pct > 20 ? '#fd7e14' : '#dc3545';
            })
            .catch(() => {
                document.getElementById('battery-status').textContent = 'Battery: unavailable';
            });
</script>
</body>
</html>
